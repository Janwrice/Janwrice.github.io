<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janwrice's Blog</title>
    <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})()</script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .content-main {
            display: flex;
            flex-direction: column;
        }

        .hero {
            flex: 0 0 75vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero h1 {
            font-size: 56px;
            font-weight: 800;
            color: var(--black);
            letter-spacing: 2px;
        }

        .hero h1 span {
            color: var(--blue);
        }

        .external-links {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 40px;
            padding: 0 60px;
        }

        .external-links a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--gray);
            font-size: 16px;
            font-weight: 500;
            padding: 10px 24px;
            border: 1px solid var(--gray-light);
            border-radius: 8px;
            transition: all 0.2s;
        }

        .external-links a:hover {
            color: var(--blue);
            border-color: var(--blue);
            background-color: var(--blue-light);
        }

        /* ── 移动端 ── */
        @media (max-width: 768px) {
            .hero {
                flex: 0 0 auto;
                min-height: 30vh;
                padding-top: 20px;
            }

            .hero h1 {
                font-size: 32px;
                letter-spacing: 1px;
            }

            .external-links {
                flex: 1;
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
                padding: 0 16px 40px;
                justify-content: flex-end;
            }

            .external-links a {
                justify-content: center;
                padding: 12px 20px;
            }
        }

    </style>
</head>
<body>
    <nav class="navbar">
        <a href="#" class="navbar-brand"><span>J</span>anwrice</a>
        <div class="navbar-right">
            <ul class="navbar-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="blog.html">博客</a></li>
                <li><a href="about.html">关于</a></li>
            </ul>
        </div>
    </nav>
    <div class="page-layout">
        <div class="content-main">
            <div class="hero">
                <h1><span>J</span>anwrice's&nbsp;Blog</h1>
            </div>
            <div class="external-links">
                <a href="https://github.com/Janwrice" target="_blank" rel="noopener">GitHub</a>
                <a href="https://space.bilibili.com/266593795" target="_blank" rel="noopener">Bilibili</a>
            </div>
        </div>
        <aside class="sidebar">
            <span class="sidebar-title">最近文章</span>
            <ul class="sidebar-post-list" id="recent-posts"></ul>
        </aside>
    </div>
    <script src="posts.js"></script>
    <script src="sidebar.js"></script>
    <script src="theme.js"></script>
    <script src="mobile-nav.js"></script>
</body>
</html>
