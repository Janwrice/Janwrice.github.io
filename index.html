<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janwrice's Blog</title>
    <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})()</script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .content-main {
            display: flex;
            flex-direction: column;
        }

        .hero {
            flex: 0 0 75vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .hero::before,
        .hero::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }

        .hero::before {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle,
                rgba(99, 102, 241, 0.35) 0%,
                rgba(99, 102, 241, 0.18) 20%,
                rgba(99, 102, 241, 0.06) 45%,
                transparent 70%);
            top: 45%;
            left: 42%;
            transform: translate(-50%, -50%);
            animation: floatBlue 8s ease-in-out infinite;
        }

        .hero::after {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle,
                rgba(168, 85, 247, 0.30) 0%,
                rgba(168, 85, 247, 0.14) 20%,
                rgba(168, 85, 247, 0.04) 45%,
                transparent 70%);
            top: 58%;
            left: 58%;
            transform: translate(-50%, -50%);
            animation: floatPurple 10s ease-in-out infinite;
        }

        @keyframes floatBlue {
            0%   { transform: translate(-50%, -50%) translate(0, 0) scale(1); }
            25%  { transform: translate(-50%, -50%) translate(40px, -30px) scale(1.12); }
            50%  { transform: translate(-50%, -50%) translate(-20px, 20px) scale(1.04); }
            75%  { transform: translate(-50%, -50%) translate(-50px, -10px) scale(1.10); }
            100% { transform: translate(-50%, -50%) translate(0, 0) scale(1); }
        }

        @keyframes floatPurple {
            0%   { transform: translate(-50%, -50%) translate(0, 0) scale(1); }
            25%  { transform: translate(-50%, -50%) translate(-35px, 25px) scale(1.08); }
            50%  { transform: translate(-50%, -50%) translate(20px, -15px) scale(0.96); }
            75%  { transform: translate(-50%, -50%) translate(40px, 10px) scale(1.06); }
            100% { transform: translate(-50%, -50%) translate(0, 0) scale(1); }
        }

        [data-theme="dark"] .hero::before {
            background: radial-gradient(circle,
                rgba(99, 102, 241, 0.50) 0%,
                rgba(99, 102, 241, 0.25) 20%,
                rgba(99, 102, 241, 0.08) 45%,
                transparent 70%);
        }

        [data-theme="dark"] .hero::after {
            background: radial-gradient(circle,
                rgba(168, 85, 247, 0.45) 0%,
                rgba(168, 85, 247, 0.20) 20%,
                rgba(168, 85, 247, 0.06) 45%,
                transparent 70%);
        }

        .hero h1 {
            font-size: 56px;
            font-weight: 800;
            color: var(--black);
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
        }

        .hero h1 span {
            color: var(--blue);
        }

        .external-links {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 40px;
            padding: 0 60px;
        }

        .external-links a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--gray);
            font-size: 16px;
            font-weight: 500;
            padding: 10px 24px;
            border: 1px solid var(--gray-light);
            border-radius: 8px;
            transition: all 0.2s;
        }

        .external-links a:hover {
            color: var(--blue);
            border-color: var(--blue);
            background-color: var(--blue-light);
        }

        /* ── 移动端 ── */
        @media (max-width: 768px) {
            .hero {
                flex: 0 0 auto;
                min-height: 30vh;
                padding-top: 20px;
            }

            .hero::before {
                width: 320px;
                height: 320px;
            }

            .hero::after {
                width: 270px;
                height: 270px;
            }

            .hero h1 {
                font-size: 32px;
                letter-spacing: 1px;
            }

            .external-links {
                flex: 1;
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
                padding: 0 16px 40px;
                justify-content: flex-end;
            }

            .external-links a {
                justify-content: center;
                padding: 12px 20px;
            }
        }

    </style>
</head>
